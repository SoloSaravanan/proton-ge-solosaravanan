name: Build and release SoloSaravanan Proton

on:
  workflow_dispatch:

  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  metadata:
    name: Generate release name
    runs-on: ubuntu-latest

    outputs:
      release_name: ${{ steps.version.outputs.release_name }}

    steps:
      - name: Generate version
        id: version
        shell: bash
        run: |
          RELEASE_NAME="GE-Proton11-SoloSaravanan-${GITHUB_RUN_NUMBER}"
          echo "release_name=${RELEASE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "Building ${RELEASE_NAME}"

  tag:
    name: Create build tag
    needs: metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create and push build tag
        shell: bash
        env:
          RELEASE_NAME: ${{ needs.metadata.outputs.release_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin \
            "refs/tags/${RELEASE_NAME}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_NAME} already exists"
          else
            git tag -a "${RELEASE_NAME}" "${GITHUB_SHA}" \
              -m "${RELEASE_NAME}"
            git push origin "${RELEASE_NAME}"
          fi

  build:
    name: Build Proton
    needs:
      - metadata
      - tag
    uses: ./.github/workflows/_job_build.yml
    with:
      name: ${{ needs.metadata.outputs.release_name }}
    secrets: inherit

  release:
    name: Create GitHub release
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NAME: ${{ needs.metadata.outputs.release_name }}
        run: |
          if gh release view "${RELEASE_NAME}" \
            --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_NAME} already exists"
          else
            gh release create "${RELEASE_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --title "${RELEASE_NAME}" \
              --generate-notes
          fi

  upload:
    name: Upload release files
    needs:
      - metadata
      - release
    uses: ./.github/workflows/_job_upload.yml
    with:
      version: ${{ needs.metadata.outputs.release_name }}
      name: ${{ needs.metadata.outputs.release_name }}
    secrets: inherit
